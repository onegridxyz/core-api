name: deploy core-api

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x]

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v6
      - name: Get git commit hash
        id: commit-hash
        uses: pr-mpt/actions-commit-hash@v2
      - name: Log in to Docker Hub
        uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set image tag
        run: echo "IMAGE_TAG=${{ steps.branch-name.outputs.current_branch }}-${{ steps.commit-hash.outputs.short }}" >> $GITHUB_ENV
      - name: Build and Publish Docker Image
        run: ./gradlew bootJar jib -Pprod -Djib.to.image=${{ secrets.DOCKERHUB_USERNAME }}/core-api:${{ env.IMAGE_TAG }}
      - name: Update docker image tag
        run: sed -i 's/IMAGE_TAG_PLACE_HOLDER/${{ env.IMAGE_TAG }}/' infra/do-app-spec.yml
      - name: Print infra/do-app-spec.yml
        run: cat infra/do-app-spec.yml
      - name: Update core-api spec
        run: doctl apps update --spec infra/do-app-spec.yml
